<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#372549"/>
      <stop offset="100%" stop-color="#1A1423"/>
    </linearGradient>
    <linearGradient id="doc1" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#774C60"/>
      <stop offset="100%" stop-color="#372549"/>
    </linearGradient>
    <linearGradient id="doc2" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#B75D69"/>
      <stop offset="100%" stop-color="#774C60"/>
    </linearGradient>
    <linearGradient id="spark" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0%" stop-color="#EACDC2"/>
      <stop offset="100%" stop-color="#B75D69"/>
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- Background rounded square -->
  <rect width="64" height="64" rx="14" fill="url(#bg)"/>

  <!-- Back document (slightly rotated) -->
  <g transform="rotate(-8, 32, 32)">
    <rect x="14" y="14" width="26" height="34" rx="4" fill="url(#doc1)" opacity="0.7"/>
    <rect x="18" y="22" width="14" height="2" rx="1" fill="#EACDC2" opacity="0.4"/>
    <rect x="18" y="27" width="10" height="2" rx="1" fill="#EACDC2" opacity="0.3"/>
  </g>

  <!-- Front document -->
  <rect x="22" y="12" width="26" height="34" rx="4" fill="url(#doc2)"/>
  <!-- Document fold corner -->
  <path d="M42 12 L48 18 L42 18 Z" fill="#372549" opacity="0.6"/>
  <rect x="42" y="12" width="6" height="6" rx="0" fill="none"/>
  <path d="M42 12 L42 18 L48 18" stroke="#1A1423" stroke-width="0.5" fill="none" opacity="0.5"/>
  <!-- Lines on doc -->
  <rect x="26" y="22" width="14" height="2" rx="1" fill="#EACDC2" opacity="0.6"/>
  <rect x="26" y="27" width="10" height="2" rx="1" fill="#EACDC2" opacity="0.4"/>
  <rect x="26" y="32" width="12" height="2" rx="1" fill="#EACDC2" opacity="0.3"/>

  <!-- Spark / X mark (NexPDF"Co"X) -->
  <g filter="url(#glow)" transform="translate(36, 36)">
    <circle cx="0" cy="0" r="11" fill="#1A1423" stroke="url(#spark)" stroke-width="1.5"/>
    <!-- X -->
    <line x1="-4.5" y1="-4.5" x2="4.5" y2="4.5" stroke="url(#spark)" stroke-width="2.2" stroke-linecap="round"/>
    <line x1="4.5" y1="-4.5" x2="-4.5" y2="4.5" stroke="url(#spark)" stroke-width="2.2" stroke-linecap="round"/>
  </g>
</svg>
